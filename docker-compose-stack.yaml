
services:

  pipelines:
    image: ghcr.io/turiya001/pipelines:open
    ports:
      - 9099:9099
    volumes:
      - pipelines:/app/pipelines
    restart: always
    
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:latest

  open-webui:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: /ollama
        dockerfile: Dockerfile
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - 3000:8080
    env_file:
      - stack.env
    restart: unless-stopped
    
volumes:
  pipelines:
    driver: local

  ollama:
    driver: local

  open-webui:
    driver: local
